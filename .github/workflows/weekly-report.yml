name: Weekly CSOV Report

on:
  schedule:
    # Monday morning, Madrid time (CEST in summer = UTC+2).
    # GitHub's cron is best-effort and the top of the hour ('0') is the most
    # over-subscribed slot — it's why a single 07:00 run often fired hours late.
    # We schedule THREE staggered off-peak attempts; the idempotency guard in
    # main.py means only the FIRST one that succeeds actually produces/publishes
    # a report (the later ones see today's snapshot already exists and exit).
    # If a run FAILS on missing data it does NOT save a snapshot, so the next
    # slot retries cleanly.
    - cron: '5 7 * * 1'    # ~09:05 Madrid (primary)
    - cron: '35 7 * * 1'   # ~09:35 Madrid (backup if primary was delayed/skipped)
    - cron: '5 8 * * 1'    # ~10:05 Madrid (last-resort backup)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no API calls)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

# Serialize every run of this workflow into ONE group so the staggered cron slots
# (and any manual trigger) can never run on top of each other. If GitHub fires the
# slots clustered/late, they queue instead of running in parallel — so the FIRST
# one produces the report and the next one's idempotency guard sees today's
# snapshot already exists and exits. This is what stops the "3 reports, 3 scores"
# duplicate-run problem. cancel-in-progress:false = never kill a report mid-run.
concurrency:
  group: weekly-csov-report
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pre-flight health check
        env:
          SEMRUSH_API_KEY:    ${{ secrets.SEMRUSH_API_KEY }}
          AHREFS_API_KEY:     ${{ secrets.AHREFS_API_KEY }}
          CLAUDE_API_KEY:     ${{ secrets.CLAUDE_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          SERPAPI_KEY:        ${{ secrets.SERPAPI_KEY }}
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python scripts/health_check.py

      - name: Install render-check browser (Puppeteer)
        # Lets main.py headless-render the report and block publish if the page
        # doesn't populate. Best-effort: if install fails, the render check just skips.
        run: npm install puppeteer@23 || echo "::warning::puppeteer install failed — headless render check will skip this run"

      - name: Run CSOV pipeline
        env:
          SEMRUSH_API_KEY:    ${{ secrets.SEMRUSH_API_KEY }}
          AHREFS_API_KEY:     ${{ secrets.AHREFS_API_KEY }}
          CLAUDE_API_KEY:     ${{ secrets.CLAUDE_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          SERPAPI_KEY:        ${{ secrets.SERPAPI_KEY }}
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_PAGES_URL:   ${{ vars.GITHUB_PAGES_URL || 'https://paulavotobernales-94.github.io/-ivisa-csov' }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python main.py --dry-run
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual trigger: always run, even if today's report already exists
            python main.py --slack --force
          else
            # Scheduled cron: idempotency guard is active — skips if already ran today
            python main.py --slack
          fi

      - name: Commit and push report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ data/historical/
          if git diff --staged --quiet; then echo "nothing to commit"; exit 0; fi
          git commit -m "Auto: CSOV report $(date +%Y-%m-%d)"
          # docs/ and data/historical/ are generated artifacts. If another run
          # pushed meanwhile, a plain rebase conflicts on docs/index.html and the
          # whole publish fails (that's the Slack-sent-but-page-stale bug). Instead,
          # rebase resolving conflicts in favour of THIS run's freshly generated
          # files (-X theirs = keep the commits being replayed), and retry the push
          # to ride out concurrent runs.
          n=0
          until [ $n -ge 5 ]; do
            git fetch origin main
            git rebase -X theirs origin/main || { git rebase --abort || true; git reset --soft origin/main; git add docs/ data/historical/; git commit -m "Auto: CSOV report $(date +%Y-%m-%d)"; }
            if git push origin main; then echo "✅ published"; exit 0; fi
            n=$((n+1)); echo "publish race — retry $n…"; sleep $((RANDOM % 8 + 4))
          done
          echo "❌ could not publish after retries"; exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Deploy docs/ to GitHub Pages
  deploy-pages:
    needs: generate-report
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
