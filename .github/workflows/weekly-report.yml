name: Weekly CSOV Report

on:
  schedule:
    # Every Friday at 10:00 AM UTC
    - cron: '0 10 * * 5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no API calls)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run CSOV pipeline
        env:
          SEMRUSH_API_KEY:    ${{ secrets.SEMRUSH_API_KEY }}
          AHREFS_API_KEY:     ${{ secrets.AHREFS_API_KEY }}
          CLAUDE_API_KEY:     ${{ secrets.CLAUDE_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          SERPAPI_KEY:        ${{ secrets.SERPAPI_KEY }}
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_PAGES_URL:   ${{ vars.GITHUB_PAGES_URL || 'https://paulavotobernales-94.github.io/ivisa-csov' }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python main.py --dry-run
          else
            python main.py
          fi

      - name: Commit and push report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ data/historical/
          git diff --staged --quiet || git commit -m "Auto: CSOV report $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Deploy docs/ to GitHub Pages
  deploy-pages:
    needs: generate-report
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
